      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        eventDate:
          type: string
          format: date
          nullable: true
        startTime:
          type: string
          format: time
          nullable: true
        endTime:
          type: string
          format: time
          nullable: true
        squads:
          type: array
          items:
            type: object
            required:
