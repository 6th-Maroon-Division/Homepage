openapi: 3.1.0
info:
  title: 6MD Management Platform API
  description: |
    Web application API for managing Arma 3 unit operations, signups, attendance, ranks, 
    training progression, and admin workflows for the 6th Maroon Division.
  version: 1.0.0
  contact:
    name: 6th Maroon Division
  license:
    name: Proprietary
    identifier: 6MD
servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://orbat.6md.net/api
    description: Production server
tags:
  - name: Authentication
    description: Discord OAuth and Steam OpenID authentication
  - name: Users
    description: User management and profiles
  - name: ORBATs
    description: Operations and organizational structure management
  - name: Signups
    description: Operation signup management
  - name: Attendance
    description: Operation attendance tracking
  - name: Training
    description: Training management and progression
  - name: Ranks
    description: Rank system and promotions
  - name: Messaging
    description: System messaging and notifications
  - name: Radio Frequencies
    description: Radio frequency management
  - name: Templates
    description: ORBAT template management
  - name: Admin
    description: Administrative functions
  - name: Realtime
    description: Server-Sent Events (SSE) streams
  - name: Leave of Absence
    description: LOA management
  - name: Bot
    description: Discord bot integration endpoints
security:
  - bearerAuth: []
paths:
  /admin/bot-tokens:
    get:
      tags:
        - TODO
      summary: TODO document GET /admin/bot-tokens
      responses:
        "200":
          description: Success
    post:
      tags:
        - TODO
      summary: TODO document POST /admin/bot-tokens
      responses:
        "200":
          description: Success
  /admin/bot-tokens/{id}:
    get:
      tags:
        - TODO
      summary: TODO document GET /admin/bot-tokens/{id}
      responses:
        "200":
          description: Success
    put:
      tags:
        - TODO
      summary: TODO document PUT /admin/bot-tokens/{id}
      responses:
        "200":
          description: Success
    delete:
      tags:
        - TODO
      summary: TODO document DELETE /admin/bot-tokens/{id}
      responses:
        "200":
          description: Success
  /admin/catalog/events:
    get:
      tags:
        - Admin
        - Realtime
      summary: Admin catalog SSE stream
      security:
        - bearerAuth:
            - orbat:view_all
            - templates:view
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: object
  /admin/import/legacy-user-data:
    get:
      tags:
        - Admin
        - Import
      summary: Get legacy user data
      security:
        - bearerAuth:
            - user:import
      responses:
        "200":
          description: Legacy user data
    post:
      tags:
        - TODO
      summary: TODO document POST /admin/import/legacy-user-data
      responses:
        "200":
          description: Success
  /admin/import/legacy-user-data/apply:
    post:
      tags:
        - Admin
        - Import
      summary: Apply legacy user data import
      security:
        - bearerAuth:
            - user:import
      responses:
        "200":
          description: Import applied
  /admin/import/legacy-user-data/map:
    post:
      tags:
        - Admin
        - Import
      summary: Map legacy user data
      security:
        - bearerAuth:
            - user:import
      responses:
        "200":
          description: Mappings saved
  /admin/orbats/list:
    get:
      tags:
        - Admin
        - ORBATs
      summary: Get admin ORBAT list
      security:
        - bearerAuth:
            - orbat:view_all
      responses:
        "200":
          description: Admin ORBAT list
  /admin/users/bulk-interview-toggle:
    post:
      tags:
        - Admin
        - Users
      summary: Bulk toggle interview status
      security:
        - bearerAuth:
            - user:manage
      responses:
        "200":
          description: Interview status toggled
  /admin/users/bulk-rank-assign:
    post:
      tags:
        - Admin
        - Users
      summary: Bulk assign ranks
      security:
        - bearerAuth:
            - user:manage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  type: array
                  items:
                    type: integer
                rankId:
                  type: integer
      responses:
        "200":
          description: Ranks assigned to users
  /admin/users/bulk-retire-toggle:
    post:
      tags:
        - Admin
        - Users
      summary: Bulk toggle retired status
      security:
        - bearerAuth:
            - user:manage
      responses:
        "200":
          description: Retired status toggled
  /admin/users/events:
    get:
      tags:
        - Admin
        - Users
        - Realtime
      summary: Admin users list SSE stream
      security:
        - bearerAuth:
            - user:manage
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: object
  /admin/users/merge:
    post:
      tags:
        - TODO
      summary: TODO document POST /admin/users/merge
      responses:
        "200":
          description: Success
  /admin/users/unranked:
    get:
      tags:
        - Admin
        - Users
      summary: Get unranked users
      security:
        - bearerAuth:
            - user:manage
      parameters:
        - name: interview
          in: query
          schema:
            type: string
            default: all
        - name: bct
          in: query
          schema:
            type: string
            default: all
        - name: retired
          in: query
          schema:
            type: string
            default: all
      responses:
        "200":
          description: Unranked users
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
  /attendance:
    get:
      tags:
        - Attendance
      summary: Get all attendance records
      security:
        - bearerAuth:
            - attendance:view_all
      responses:
        "200":
          description: All attendance records
  /attendance/{attendanceId}:
    get:
      tags:
        - Attendance
      summary: Get specific attendance record
      responses:
        "200":
          description: Attendance record
    patch:
      tags:
        - Attendance
      summary: Update attendance record
      security:
        - bearerAuth:
            - attendance:manage
      responses:
        "200":
          description: Attendance updated
    put:
      tags:
        - TODO
      summary: TODO document PUT /attendance/{attendanceId}
      responses:
        "200":
          description: Success
    delete:
      tags:
        - TODO
      summary: TODO document DELETE /attendance/{attendanceId}
      responses:
        "200":
          description: Success
  /attendance/automated:
    post:
      tags:
        - Attendance
      summary: Process automated attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Automated attendance processed
  /attendance/import:
    post:
      tags:
        - Attendance
      summary: Import attendance data
      security:
        - bearerAuth:
            - attendance:import
      responses:
        "201":
          description: Attendance imported
  /attendance/legacy-data:
    get:
      tags:
        - TODO
      summary: TODO document GET /attendance/legacy-data
      responses:
        "200":
          description: Success
    put:
      tags:
        - TODO
      summary: TODO document PUT /attendance/legacy-data
      responses:
        "200":
          description: Success
  /attendance/legacy-import:
    post:
      tags:
        - TODO
      summary: TODO document POST /attendance/legacy-import
      responses:
        "200":
          description: Success
  /attendance/legacy-import/user-data:
    post:
      tags:
        - TODO
      summary: TODO document POST /attendance/legacy-import/user-data
      responses:
        "200":
          description: Success
    get:
      tags:
        - TODO
      summary: TODO document GET /attendance/legacy-import/user-data
      responses:
        "200":
          description: Success
  /attendance/legacy-import/user-data/map:
    put:
      tags:
        - TODO
      summary: TODO document PUT /attendance/legacy-import/user-data/map
      responses:
        "200":
          description: Success
  /auth/{...nextauth}:
    get:
      tags:
        - Authentication
      summary: NextAuth.js authentication handler
      responses:
        "302":
          description: Redirect to authentication provider
        "401":
          description: Unauthorized
  /auth/steam-callback:
    get:
      tags:
        - Authentication
      summary: Steam OpenID callback handler
      responses:
        "302":
          description: Redirect after successful authentication
        "401":
          description: Authentication failed
  /auth/steam-login:
    get:
      tags:
        - Authentication
      summary: Initiate Steam OpenID login
      responses:
        "302":
          description: Redirect to Steam login
  /auth/steam-signin:
    get:
      tags:
        - Authentication
      summary: Link Steam account to existing user
      responses:
        "302":
          description: Redirect to Steam login or back to profile
  /bot/attendance:
    post:
      tags:
        - TODO
      summary: TODO document POST /bot/attendance
      responses:
        "200":
          description: Success
  /bot/attendance/backfill:
    post:
      tags:
        - TODO
      summary: TODO document POST /bot/attendance/backfill
      responses:
        "200":
          description: Success
  /bot/attendance/compile:
    post:
      tags:
        - Bot
        - Attendance
      summary: Compile attendance for an ORBAT
      description: |
        Compiles raw attendance events into structured attendance records for a specific ORBAT.
        The bot should call this when it detects an ORBAT has ended (by checking endTime and server empty).
        This matches events to the ORBAT timeframe, calculates durations, and creates/updates attendance records.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orbatId
              properties:
                orbatId:
                  type: integer
                  description: ID of the ORBAT to compile attendance for
                  example: 123
      responses:
        "200":
          description: Attendance compiled successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  orbatId:
                    type: integer
                    description: ID of the compiled ORBAT
                    example: 123
                  orbatName:
                    type: string
                    description: Name of the ORBAT
                    example: Operation Thunder Strike
                  eventDate:
                    type: string
                    format: date
                    description: Date of the ORBAT
                    example: 2024-01-15
                  compiledCount:
                    type: integer
                    description: Number of attendance records compiled
                    example: 42
                  totalEventsProcessed:
                    type: integer
                    description: Total number of raw events processed
                    example: 105
                  attendance:
                    type: array
                    description: Compiled attendance for each user
                    items:
                      type: object
                      properties:
                        userId:
                          type: integer
                          example: 42
                        username:
                          type: string
                          example: Soldier_John
                        status:
                          type: string
                          enum:
                            - present
                            - absent
                            - partial
                            - late
                            - gone_early
                            - no_show
                          example: present
                        totalMinutesPresent:
                          type: integer
                          example: 180
                        joinCount:
                          type: integer
                          description: Number of join events for this user
                          example: 1
                        leaveCount:
                          type: integer
                          description: Number of leave events for this user
                          example: 1
        "400":
          description: Invalid request data (missing orbatId, ORBAT missing time info)
        "401":
          description: Unauthorized - invalid or missing bot API token
        "404":
          description: ORBAT not found
        "500":
          description: Internal server error
  /bot/events:
    post:
      tags:
        - Bot
      summary: Record raw attendance event
      description: |
        Records a raw check-in or check-out event from the Discord bot.
        Events are ORBAT-agnostic and can be matched to operations later.
        Requires either steamId or discordUserId to identify the user.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - isJoin
                - timestamp
              properties:
                steamId:
                  type: string
                  description: Steam64 ID of the user
                  example: "76561198000000000"
                discordUserId:
                  type: string
                  description: Discord user ID
                  example: "123456789012345678"
                isJoin:
                  type: boolean
                  description: true for check-in/join, false for check-out/leave
                  example: true
                timestamp:
                  type: string
                  format: date-time
                  description: ISO 8601 timestamp when the event occurred
                  example: 2024-01-15T12:30:00Z
      responses:
        "201":
          description: Event recorded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  eventId:
                    type: integer
                    description: ID of the created event
                    example: 123
                  userId:
                    type: integer
                    description: Database user ID
                    example: 42
                  username:
                    type: string
                    description: Username of the user
                    example: Soldier_John
                  isJoin:
                    type: boolean
                    example: true
                  eventTime:
                    type: string
                    format: date-time
                    example: 2024-01-15T12:30:00.000Z
        "400":
          description: Invalid request data
        "401":
          description: Unauthorized - invalid or missing bot API token
        "404":
          description: User not found
        "500":
          description: Internal server error
  /bot/orbats:
    get:
      tags:
        - TODO
      summary: TODO document GET /bot/orbats
      responses:
        "200":
          description: Success
  /bot/orbats/{id}:
    get:
      tags:
        - TODO
      summary: TODO document GET /bot/orbats/{id}
      responses:
        "200":
          description: Success
  /bot/promotions/{id}/approve:
    post:
      tags:
        - Bot
        - Ranks
      summary: Approve a promotion
      description: |
        Approves a pending promotion proposal and updates the user's rank.
        Also creates a rank history entry and sends a notification message to the user.
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the promotion proposal to approve
      responses:
        "200":
          description: Promotion approved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Promotion approved
                  promotionId:
                    type: integer
                    example: 123
                  userId:
                    type: integer
                    example: 42
                  username:
                    type: string
                    example: Soldier_John
                  discordId:
                    type: string
                    nullable: true
                    example: "123456789012345678"
                  previousRank:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      abbreviation:
                        type: string
                  newRank:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      abbreviation:
                        type: string
        "400":
          description: Invalid promotion ID or promotion already processed
        "401":
          description: Unauthorized - invalid or missing bot API token
        "404":
          description: Promotion not found
        "500":
          description: Internal server error
  /bot/promotions/{id}/decline:
    post:
      tags:
        - Bot
        - Ranks
      summary: Decline a promotion
      description: |
        Declines a pending promotion proposal and optionally records a reason.
        Sends a notification message to the user informing them of the decline.
      security:
        - apiKey: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID of the promotion proposal to decline
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional reason for declining the promotion
                  example: Insufficient attendance
      responses:
        "200":
          description: Promotion declined successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Promotion declined
                  promotionId:
                    type: integer
                    example: 123
                  userId:
                    type: integer
                    example: 42
                  username:
                    type: string
                    example: Soldier_John
                  discordId:
                    type: string
                    nullable: true
                    example: "123456789012345678"
                  proposedRank:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      abbreviation:
                        type: string
                  reason:
                    type: string
                    nullable: true
                    example: Insufficient attendance
        "400":
          description: Invalid promotion ID or promotion already processed
        "401":
          description: Unauthorized - invalid or missing bot API token
        "404":
          description: Promotion not found
        "500":
          description: Internal server error
  /bot/promotions/auto:
    get:
      tags:
        - Bot
        - Ranks
      summary: Get recent auto-promotions
      description: |
        Returns a list of users who were automatically promoted within a specified timeframe.
        Useful for the bot to announce promotions in Discord.
      security:
        - apiKey: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
          description: Number of days to look back for auto-promotions
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
          description: Maximum number of auto-promotions to return
      responses:
        "200":
          description: List of recent auto-promotions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  autoPromotions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 456
                        userId:
                          type: integer
                          example: 42
                        username:
                          type: string
                          example: Soldier_John
                        discordId:
                          type: string
                          nullable: true
                          example: "123456789012345678"
                        steamId:
                          type: string
                          nullable: true
                          example: "76561198000000000"
                        previousRank:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
                            abbreviation:
                              type: string
                        newRank:
                          type: object
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
                            abbreviation:
                              type: string
                        changedAt:
                          type: string
                          format: date-time
                          example: 2024-01-15T10:00:00.000Z
                        reason:
                          type: string
                          nullable: true
                  total:
                    type: integer
                    example: 10
                  daysBack:
                    type: integer
                    example: 7
        "401":
          description: Unauthorized - invalid or missing bot API token
        "500":
          description: Internal server error
  /bot/promotions/pending:
    get:
      tags:
        - Bot
        - Ranks
      summary: Get pending promotions
      description: |
        Returns a list of pending promotion proposals that the bot can approve or decline.
        Includes user details, current rank, proposed rank, and proposal reason.
      security:
        - apiKey: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Maximum number of promotions to return
      responses:
        "200":
          description: List of pending promotions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  pendingPromotions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 123
                        userId:
                          type: integer
                          example: 42
                        username:
                          type: string
                          example: Soldier_John
                        discordId:
                          type: string
                          nullable: true
                          example: "123456789012345678"
                        steamId:
                          type: string
                          nullable: true
                          example: "76561198000000000"
                        currentRank:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
                            abbreviation:
                              type: string
                        proposedRank:
                          type: object
                          properties:
                            id:
                              type: integer
                            name:
                              type: string
                            abbreviation:
                              type: string
                        proposedById:
                          type: integer
                          nullable: true
                        proposedByUsername:
                          type: string
                          nullable: true
                        reason:
                          type: string
                          nullable: true
                        createdAt:
                          type: string
                          format: date-time
                          example: 2024-01-15T10:00:00.000Z
                  total:
                    type: integer
                    example: 5
        "401":
          description: Unauthorized - invalid or missing bot API token
        "500":
          description: Internal server error
  /bot/signups:
    post:
      tags:
        - Bot
        - Signups
      summary: Sign up a user for an ORBAT
      description: |
        Signs up a user (identified by Discord ID or Steam ID) for a specific ORBAT.
        If no slotId is provided, the user will be signed up for the first available slot.
        The bot can use this to automatically sign up users for operations.
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - orbatId
              properties:
                orbatId:
                  type: integer
                  description: ID of the ORBAT to sign up for
                  example: 123
                discordUserId:
                  type: string
                  description: Discord user ID of the user to sign up
                  example: "123456789012345678"
                steamId:
                  type: string
                  description: Steam64 ID of the user to sign up
                  example: "76561198000000000"
                slotId:
                  type: integer
                  description: Optional - specific slot ID to sign up for. If omitted, first available slot is used.
                  example: 456
      responses:
        "201":
          description: User signed up successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User signed up for ORBAT
                  signupId:
                    type: integer
                    description: ID of the created signup
                    example: 789
                  userId:
                    type: integer
                    description: Database user ID
                    example: 42
                  username:
                    type: string
                    description: Username of the signed up user
                    example: Soldier_John
                  orbatId:
                    type: integer
                    description: ORBAT ID
                    example: 123
                  orbatName:
                    type: string
                    description: Name of the ORBAT
                    example: Operation Thunder Strike
                  eventDate:
                    type: string
                    format: date
                    description: Date of the ORBAT
                    example: 2024-01-15
                  slotId:
                    type: integer
                    description: ID of the slot the user was signed up for
                    example: 456
                  slotName:
                    type: string
                    description: Name of the slot/role
                    example: Rifleman
                  squadName:
                    type: string
                    description: Name of the squad
                    example: Alpha Squad
        "400":
          description: Invalid request (missing orbatId, ORBAT full, slot full, user already signed up)
        "401":
          description: Unauthorized - invalid or missing bot API token
        "404":
          description: User or ORBAT not found
        "409":
          description: User already signed up for this ORBAT
        "500":
          description: Internal server error
    get:
      tags:
        - Bot
        - Signups
      summary: List signups for an ORBAT
      description: |
        Returns all signups for a specific ORBAT, with user details.
        Useful for the bot to see who is signed up.
      security:
        - apiKey: []
      parameters:
        - name: orbatId
          in: query
          required: true
          schema:
            type: integer
          description: ID of the ORBAT to get signups for
      responses:
        "200":
          description: List of signups for the ORBAT
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  orbatId:
                    type: integer
                    example: 123
                  signups:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 789
                        userId:
                          type: integer
                          example: 42
                        username:
                          type: string
                          example: Soldier_John
                        discordId:
                          type: string
                          nullable: true
                          example: "123456789012345678"
                        steamId:
                          type: string
                          nullable: true
