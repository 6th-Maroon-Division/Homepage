components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: NextAuth.js session token (cookie-based)
    apiKey:
      type: apiKey
      in: header
      name: X-BOT-API-TOKEN
      description: Bot API token for integration endpoints
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        avatarUrl:
          type: string
          format: uri
          nullable: true
        isSuperAdmin:
          type: boolean
        providers:
          type: array
          items:
            type: string
            enum:
              - discord
              - steam
        createdAt:
          type: string
          format: date-time
    OrbatBasic:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        eventDate:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time
    Orbat:
      allOf:
        - $ref: "#/components/schemas/OrbatBasic"
        - type: object
          properties:
            startTime:
              type: string
              format: time
              nullable: true
            endTime:
              type: string
              format: time
              nullable: true
            squads:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  orderIndex:
                    type: integer
                  slots:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        orderIndex:
                          type: integer
                        maxSignups:
                          type: integer
            frequencies:
              type: array
              items:
                type: object
            tempFrequencies:
              type: array
              items:
                type: object
    Training:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        categoryId:
          type: integer
          nullable: true
        description:
          type: string
          nullable: true
        duration:
          type: integer
          nullable: true
        isActive:
          type: boolean
        orderIndex:
          type: integer
        minimumRankId:
          type: integer
          nullable: true
        prerequisiteTrainingIds:
          type: array
          items:
            type: integer
        createdAt:
          type: string
          format: date-time
    Rank:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        abbreviation:
          type: string
        orderIndex:
          type: integer
        isActive:
          type: boolean
        color:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
    RadioFrequency:
      type: object
      properties:
        id:
          type: integer
        frequency:
          type: string
        type:
          type: string
          enum:
            - SR
            - LR
        isAdditional:
          type: boolean
        channel:
          type: string
        callsign:
          type: string
        orderIndex:
          type: integer
    Template:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        squads:
          type: array
          items:
            type: object
        createdAt:
          type: string
          format: date-time
    Message:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        body:
          type: string
        type:
          type: string
          enum:
            - general
            - orbat
            - training
            - rankup
            - alert
        actionUrl:
          type: string
          format: uri
          nullable: true
        createdAt:
          type: string
          format: date-time
        isRead:
          type: boolean
    AttendanceRecord:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        orbatId:
          type: integer
        status:
          type: string
          enum:
            - present
            - absent
            - late
            - gone_early
            - partial
            - no_show
        checkInTime:
          type: string
          format: date-time
          nullable: true
        checkOutTime:
          type: string
          format: date-time
          nullable: true
        minutesPresent:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        source:
          type: string
          enum:
            - manual
            - automated_system
    TrainingRequest:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        trainingId:
          type: integer
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
            - completed
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    OrbatCreateInput:
      type: object
      required:
        - name
        - squads
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        eventDate:
          type: string
          format: date
          nullable: true
        startTime:
          type: string
          format: time
          nullable: true
        endTime:
          type: string
          format: time
          nullable: true
        squads:
          type: array
          items:
            type: object
            required:
              - name
              - slots
            properties:
              name:
                type: string
              orderIndex:
                type: integer
              slots:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - orderIndex
                    - maxSignups
                  properties:
                    name:
                      type: string
                    orderIndex:
                      type: integer
                    maxSignups:
                      type: integer
                    squadRoleId:
                      type: integer
                      nullable: true
        frequencyIds:
          type: array
          items:
            type: integer
        tempFrequencies:
          type: array
          items:
            type: object
            properties:
              frequency:
                type: string
              type:
                type: string
                enum:
